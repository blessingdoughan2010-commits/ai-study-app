<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyAI</title>

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a1a1a">

<style>
body { margin:0; background:#0d0d0d; color:white; font-family:Arial; display:flex; flex-direction:column; height:100vh;}
.header { padding:10px; background:#1a1a1a; display:flex; justify-content:space-between;}
.chat-box { flex:1; overflow-y:auto; padding:10px;}
.message { padding:10px; margin:5px; border-radius:10px; max-width:80%;}
.user { background:#007bff; margin-left:auto;}
.bot { background:#2a2a2a;}
.input-area { padding:10px; background:#1a1a1a; display:flex; flex-direction:column; gap:5px;}
.row { display:flex; gap:5px;}
input, select, button { padding:10px; border:none; border-radius:5px;}
.learn { background:green; color:white;}
.quiz { background:blue; color:white;}
</style>
</head>

<body>

<div id="loader" style="position:fixed;width:100%;height:100%;background:#0d0d0d;display:flex;align-items:center;justify-content:center;z-index:9999;">
🧠 Loading...
</div>

<div class="header">
<div>🧠 StudyAI</div>
<div>👤 {{ name }} | 🎯 {{ score }}/{{ total }}</div>
</div>

{% if not name %}
<form method="POST" style="padding:20px;">
<input name="name" placeholder="Enter name">
<button name="set_name">Start</button>
</form>
{% else %}

<div class="chat-box">
{% for msg in chat %}
<div class="message {{ msg.role }}">{{ msg.text }}</div>
{% endfor %}
</div>

<form method="POST" class="input-area">
<div class="row">
<select name="subject">
{% for s in subjects %}
<option>{{ s }}</option>
{% endfor %}
</select>
</div>

<div class="row">
<input name="question" placeholder="Ask something...">
</div>

<div class="row">
<button class="learn" name="mode" value="learn">Learn</button>
<button class="quiz" name="mode" value="quiz">Quiz</button>
</div>
</form>

<form method="POST" class="input-area">
<input name="answer" placeholder="Answer quiz...">
<button>Submit</button>
</form>

{% endif %}

<script>
window.onload = () => document.getElementById("loader").style.display="none";

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/static/service-worker.js');
}
</script>

</body>
</html>
