<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { margin:0; font-family:Arial; background:#0d0d0d; color:white; }

        .header {
            padding:15px;
            background:#1a1a1a;
            display:flex;
            justify-content:space-between;
        }

        .chat-box {
            height:70vh;
            overflow-y:auto;
            padding:20px;
        }

        .message {
            padding:12px;
            margin-bottom:10px;
            border-radius:10px;
            max-width:70%;
        }

        .user { background:#007bff; margin-left:auto; }
        .bot { background:#2a2a2a; }

        .input-area {
            display:flex;
            gap:10px;
            padding:10px;
            background:#1a1a1a;
        }

        input, select {
            padding:10px;
            border:none;
            border-radius:5px;
        }

        input { flex:1; }

        button {
            padding:10px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .learn { background:#28a745; color:white; }
        .quiz { background:#17a2b8; color:white; }

        .profile {
            padding:20px;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="header">
    <div>🧠 AI Study</div>
    <div>👤 {{ name }} | 🎯 {{ score }}/{{ total }}</div>
</div>

{% if not name %}
<div class="profile">
    <h2>Enter your name</h2>
    <form method="POST">
        <input name="name" required>
        <button name="set_name">Start</button>
    </form>
</div>
{% else %}

<div class="chat-box">
    {% for msg in chat %}
        <div class="message {{ msg.role }}">
            {{ msg.text }}
        </div>
    {% endfor %}
</div>

<form method="POST" class="input-area">
    <select name="subject">
        {% for sub in subjects %}
            <option>{{ sub }}</option>
        {% endfor %}
    </select>

    <input name="question" placeholder="Ask a topic...">

    <button class="learn" name="mode" value="learn">Learn</button>
    <button class="quiz" name="mode" value="quiz">Quiz</button>
</form>

<form method="POST" style="padding:10px;">
    <input name="answer" placeholder="Answer quiz...">
    <button>Submit</button>
</form>

{% endif %}

</body>
</html>
