<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            background: #1a1a1a;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 10px;
            border-radius: 10px;
            white-space: pre-wrap;
        }

        .user {
            background: #007bff;
            margin-left: auto;
        }

        .bot {
            background: #2a2a2a;
        }

        .input-area {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            gap: 10px;
        }

        select, input {
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        input {
            flex: 1;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .learn-btn {
            background: #28a745;
            color: white;
        }

        .quiz-btn {
            background: #17a2b8;
            color: white;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        🧠 AI Study Assistant
    </div>

    <div class="chat-box">

        {% if result %}
            <div class="message user">
                {{ request.form.get("question") or request.form.get("subject") }}
            </div>

            <div class="message bot">
                {{ result }}
            </div>
        {% else %}
            <div class="message bot">
                👋 Hello! Ask me any subject or topic to start learning.
            </div>
        {% endif %}

    </div>

    <form method="POST" class="input-area">

        <select name="subject">
            {% for sub in subjects %}
                <option value="{{ sub }}">{{ sub }}</option>
            {% endfor %}
        </select>

        <input type="text" name="question" placeholder="Ask a question...">

        <button class="learn-btn" name="mode" value="learn">Learn</button>
        <button class="quiz-btn" name="mode" value="quiz">Quiz</button>

    </form>

</div>

</body>
</html>
