<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0d0d0d;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .message {
            padding: 10px;
            margin: 6px 0;
            border-radius: 12px;
            max-width: 80%;
            font-size: 14px;
        }

        .user {
            background: #007bff;
            margin-left: auto;
        }

        .bot {
            background: #2a2a2a;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: #1a1a1a;
        }

        .row {
            display: flex;
            gap: 5px;
        }

        select, input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        input {
            flex: 1;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .learn { background: #28a745; color: white; }
        .quiz { background: #17a2b8; color: white; }

        .profile {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="header">
    <div>🧠 Study AI</div>
    <div>👤 {{ name }} | 🎯 {{ score }}/{{ total }}</div>
</div>

{% if not name %}
<div class="profile">
    <h3>Enter your name</h3>
    <form method="POST">
        <input name="name" required>
        <button name="set_name">Start</button>
    </form>
</div>
{% else %}

<div class="chat-box">
    {% for msg in chat %}
        <div class="message {{ msg.role }}">
            {{ msg.text }}
        </div>
    {% endfor %}
</div>

<form method="POST" class="input-area">

    <div class="row">
        <select name="subject">
            {% for sub in subjects %}
                <option>{{ sub }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="row">
        <input name="question" placeholder="Ask something...">
    </div>

    <div class="row">
        <button class="learn" name="mode" value="learn">Learn</button>
        <button class="quiz" name="mode" value="quiz">Quiz</button>
    </div>

</form>

<form method="POST" class="input-area">
    <input name="answer" placeholder="Answer quiz...">
    <button>Submit</button>
</form>

{% endif %}

</body>
</html>
