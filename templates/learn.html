<!DOCTYPE html>
<html>
<head>
    <title>Learn</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>🧠 StudyAI</h2>
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/learn" class="active">📚 Learn</a>
        <a href="/quiz">🎯 Quiz</a>
        <a href="/profile">👤 Profile</a>
        <a href="/logout">🚪 Logout</a>
    </div>

    <div class="main">

        <h2>📚 Learn with AI</h2>

        <!-- CHAT -->
        <div class="chat-box">
            {% for msg in chat %}
                <div class="chat {{ msg.role }}">
                    {{ msg.text }}
                </div>
            {% endfor %}
        </div>

        <!-- UPLOAD -->
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload & Learn</button>
        </form>

    </div>

</div>

</body>
</html>
