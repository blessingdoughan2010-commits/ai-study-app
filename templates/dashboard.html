<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🧠 StudyAI</h2>

        <a href="/dashboard" class="active">🏠 Dashboard</a>
        <a href="/learn">📚 Learn</a>
        <a href="/quiz">🎯 Quiz</a>
        <a href="/profile">👤 Profile</a>
        <a href="/logout">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="top">
            <h1>Welcome back 👋</h1>
            <p>Ready to continue your learning journey?</p>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="card">
                <h3>📚 Topics</h3>
                <p>{{ total }}</p>
            </div>

            <div class="card">
                <h3>🧠 Quizzes</h3>
                <p>{{ total }}</p>
            </div>

            <div class="card">
                <h3>🏆 Score</h3>
                <p>{{ score }}</p>
            </div>

            <div class="card">
                <h3>⏱ Time</h3>
                <p>0m</p>
            </div>
        </div>

        <!-- ACTIONS -->
        <div class="actions">
            <div class="action">
                <h3>🚀 Start Learning</h3>
                <p>Upload a file and let AI teach you</p>
                <a href="/learn">Start</a>
            </div>

            <div class="action">
                <h3>🎯 Take Quiz</h3>
                <p>Test your knowledge</p>
                <a href="/quiz">Start</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
