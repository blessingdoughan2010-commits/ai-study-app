<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register</title>

<style>
body {
    background:#0d0d0d;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

input, button {
    padding:10px;
    border:none;
    border-radius:5px;
}

button {
    background:green;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<form method="POST" class="box">
<h2>Register</h2>
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Create Account</button>
<a href="/login" style="color:lightblue;">Back to login</a>
</form>

</body>
</html>
